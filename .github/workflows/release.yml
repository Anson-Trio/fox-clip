name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run compile

      - name: Package VSIX
        run: npx vsce package

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          # push tag 时若还没有 Release，会自动创建；已有 Release 则追加附件
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
